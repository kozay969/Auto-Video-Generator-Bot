name: 🎬 Auto Video Generator (YouTube → Myanmar)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: '🔗 YouTube Video URL'
        required: true
        type: string
      duration:
        description: '⏱️ Output Duration (minutes)'
        required: false
        default: '3'
        type: choice
        options:
          - '2'
          - '3'
          - '5'

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip

          # Install latest versions to avoid YouTube bot-detection issues
          pip install --upgrade \
            openai \
            gtts \
            edge-tts \
            Pillow \
            requests \
            python-telegram-bot==20.7 \
            youtube-transcript-api \
            yt-dlp

          # Install FFmpeg + ImageMagick
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick

          # Fix ImageMagick PDF policy
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true

          # Print versions for debugging
          echo "=== Installed versions ==="
          yt-dlp --version
          python -c "import youtube_transcript_api; print('youtube-transcript-api:', youtube_transcript_api.__version__)"

      - name: 🎥 Extract YouTube Transcript & Summarize
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python scripts/00_extract_youtube.py \
            --url "${{ github.event.inputs.youtube_url }}" \
            --duration "${{ github.event.inputs.duration }}"

      - name: 🔊 Generate Myanmar Voice (gTTS)
        run: |
          python scripts/02_text_to_speech.py

      - name: 🎬 Create Video with FFmpeg
        run: |
          python scripts/03_create_video.py

      - name: 📤 Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/04_send_telegram.py \
            --topic "${{ github.event.inputs.youtube_url }}"

      - name: 💾 Upload Artifacts (Backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: video-output-${{ github.run_number }}
          path: |
            output/
            script.txt
          retention-days: 7
          
