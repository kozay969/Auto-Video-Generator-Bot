name: 🎬 Auto Video Generator

on:
  workflow_dispatch:
    inputs:
      topic:
        description: '📝 Video Topic (ဥပမာ - Python programming အကြောင်း)'
        required: true
        type: string
      duration:
        description: '⏱️ Duration (minutes)'
        required: false
        default: '3'
        type: choice
        options:
          - '2'
          - '3'
          - '5'

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            google-generativeai \
            gtts \
            Pillow \
            requests \
            python-telegram-bot==20.7

          # Install FFmpeg and Myanmar Fonts
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick fonts-noto-core

          # Fix ImageMagick policy for video generation
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true

      - name: 🤖 Generate Script with Google Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/01_generate_script.py \
            --topic "${{ github.event.inputs.topic }}" \
            --duration "${{ github.event.inputs.duration }}"

      - name: 🔊 Generate Voice (gTTS Myanmar)
        run: |
          python scripts/02_text_to_speech.py

      - name: 🎬 Create Video with FFmpeg
        run: |
          python scripts/03_create_video.py

      - name: 📤 Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/04_send_telegram.py \
            --topic "${{ github.event.inputs.topic }}"

      - name: 💾 Upload Artifacts (Backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: video-output-${{ github.run_number }}
          path: |
            output/
            script.txt
          retention-days: 7
